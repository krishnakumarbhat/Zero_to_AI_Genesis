name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || true

      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 src/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

  frontend-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        working-directory: Zero_to_AI_Genesis2/frontend
        run: |
          node -v
          npm -v
          npm ci

      - name: Verify next is installed
        working-directory: Zero_to_AI_Genesis2/frontend
        run: npx next --version

      - name: Clean stale build artifacts
        working-directory: Zero_to_AI_Genesis2/frontend
        run: rm -rf .next out

      - name: Build frontend static export
        working-directory: Zero_to_AI_Genesis2/frontend
        env:
          GITHUB_PAGES: 'true'
          GITHUB_REPOSITORY: ${{ github.repository }}
          NEXT_TELEMETRY_DISABLED: '1'
        run: |
          echo "GITHUB_PAGES=$GITHUB_PAGES"
          echo "GITHUB_REPOSITORY=$GITHUB_REPOSITORY"
          npm run build:pages 2>&1 | tee /tmp/build.log || true
          BUILD_EXIT=${PIPESTATUS[0]:-1}
          if [ "$BUILD_EXIT" != "0" ]; then
            echo "::error::Build failed. Last 100 lines:"
            tail -100 /tmp/build.log
            exit 1
          fi

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-ci
          path: /tmp/build.log
